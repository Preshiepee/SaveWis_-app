<body>
    <!-- Login / Signup Container -->
    <div class="container" id="auth">
        <h2>SaveWise</h2>
        <!-- Moon/Sun toggle button -->
        <button id="modeToggle" class="moon-toggle">🌙</button>

        <input id="name" placeholder="Name">
        <input id="pin" type="password" placeholder="PIN">
        <button onclick="signUp()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- Dashboard Container -->
    <div class="container hidden" id="dashboard">
        <!-- Moon/Sun toggle button -->
        <button id="modeToggleDashboard" class="moon-toggle">🌙</button>

        <div id="status"></div>
        <h2 id="welcome"></h2>
        <p>Savings: ₦<span id="savings">0</span></p>
        <p>Goal: ₦<span id="goalDisplay">0</span></p>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <input id="amount" placeholder="Add savings">
        <button onclick="addSavings()">Add Savings</button>

        <input id="goal" placeholder="Set goal">
        <button onclick="setGoal()">Set Goal</button>

        <button onclick="logout()">Logout</button>
    </div>
